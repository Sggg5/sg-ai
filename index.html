<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRANTA AI知识中心</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{
background:#f5f7fb;
color:#222;
}

.hero{
text-align:center;
padding:80px 20px 50px;
}

.logo{
font-size:72px;
font-weight:800;
}

.sub{
margin-top:20px;
font-size:24px;
color:#666;
}

.search-card{

max-width:1000px;
margin:40px auto;
background:#fff;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}

input{

width:100%;
padding:22px;
font-size:24px;
border:1px solid #ddd;
border-radius:14px;

}

button{

width:100%;
margin-top:20px;
padding:20px;

font-size:26px;
font-weight:bold;

background:#0f172a;
color:white;

border:none;
border-radius:14px;
cursor:pointer;

}

button:hover{
background:#1e293b;
}

.result{

max-width:1000px;
margin:20px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

line-height:1.8;
font-size:18px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

max-width:1200px;
margin:40px auto;

}

.card{

background:white;
padding:25px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.06);

}

.card h3{
margin-bottom:10px;
}

.footer{

text-align:center;
padding:60px 20px;
color:#888;

}

</style>

</head>

<body>

<div class="hero">

<div class="logo">
FRANTA AI
</div>

<div class="sub">
不锈钢管道 · 工艺研发 · 品质管理 · 水务工程
</div>

</div>

<div class="search-card">

<input
id="question"
placeholder="例如：沟槽接头为什么漏水？"
/>

<button onclick="searchDoc()">
🔍 AI搜索
</button>

</div>

<div class="cards">

<div class="card">
<h3>📚 工艺文件</h3>
<p>快速查询工艺路线、SOP、作业指导书</p>
</div>

<div class="card">
<h3>🧪 品质体系</h3>
<p>ISO9001、CNAS、质量手册</p>
</div>

<div class="card">
<h3>🏭 管件知识</h3>
<p>沟槽、环压、卡压、焊接、法兰</p>
</div>

<div class="card">
<h3>📖 标准法规</h3>
<p>EN10312、CJ/T463、AWWA C606</p>
</div>

</div>

<div id="result" class="result">

欢迎使用 FRANTA AI 知识中心

</div>

<div class="footer">

FRANTA © 2026

</div>

<script>

async function searchDoc(){

const q=document.getElementById("question").value;

document.getElementById("result").innerHTML=
"正在搜索："+q;

try{

/*
这里后面接Cloudflare AI Search API
*/

document.getElementById("result").innerHTML=`

<h2>搜索问题</h2>

<p>${q}</p>

<hr>

<p>

您的知识库已成功连接。

下一步接入Cloudflare AI Search API即可实现真正AI问答。

</p>

`;

}
catch(e){

document.getElementById("result").innerHTML=
"搜索失败";

}

}

</script>

</body>
</html>
