<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANTA AI工程师助手</title>

<style>

body{
    margin:0;
    background:#f5f6f8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
}

.container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}

.logo{
    text-align:center;
    margin-bottom:50px;
}

.logo h1{
    font-size:56px;
    margin:0;
}

.logo p{
    color:#666;
    font-size:20px;
}

.search-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input{
    width:100%;
    height:60px;
    font-size:22px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 20px;
}

button{
    margin-top:20px;
    width:100%;
    height:55px;
    border:none;
    background:#111827;
    color:white;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

.result{
    margin-top:30px;
    background:white;
    border-radius:20px;
    padding:30px;
    min-height:150px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.hot{
    margin-top:40px;
}

.hot-item{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>FRANTA AI</h1>
<p>不锈钢管道 · 工艺研发 · 质量管理 · 水务工程</p>
</div>

<div class="search-box">

<input id="question"
placeholder="请输入问题，例如：76.1沟槽接头为什么漏水？">

<button onclick="searchAI()">
搜索
</button>

</div>

<div class="result" id="result">

等待提问...

</div>

<div class="hot">

<h2>热门问题</h2>

<div class="hot-item">
76.1沟槽接头为什么漏水？
</div>

<div class="hot-item">
EN10312标准详解
</div>

<div class="hot-item">
在线固溶为什么发黄？
</div>

<div class="hot-item">
304与316L区别
</div>

</div>

</div>

<script>

function searchAI(){

let q=document.getElementById("question").value;

document.getElementById("result").innerHTML=
"正在搜索：<br><br>"+q+
"<br><br>（下一步接入Cloudflare AI Search）";

}

</script>

</body>
</html>
